name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR commits
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'
          FAILED=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "::error::Bad commit message: $msg"
              echo "  Expected format: type(scope): description"
              echo "  Types: feat fix docs style refactor perf test build ci chore revert"
              FAILED=1
            fi
          done < <(git log --format='%s' origin/main..HEAD)

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All commits must follow Conventional Commits: https://www.conventionalcommits.org"
            exit 1
          fi
          echo "All commits follow conventional commit format."

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-14
            name: macOS ARM64
            cmake_extra: ""
          - os: macos-14
            name: macOS x86_64 (cross)
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev libsqlite3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
