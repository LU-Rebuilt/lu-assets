name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-14
            name: macOS ARM64
            cmake_extra: ""

    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev libsqlite3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -A1 "^${CURRENT_TAG}$" | tail -1)
          TAG_MSG=$(git tag -l --format='%(contents)' "$CURRENT_TAG" | head -20)

          {
            echo 'BODY<<ENDOFNOTES'

            if [ -n "$TAG_MSG" ] && [ "$TAG_MSG" != "$CURRENT_TAG" ]; then
              echo "$TAG_MSG"
              echo ""
            fi

            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
              RANGE="${PREV_TAG}..${CURRENT_TAG}"
            else
              RANGE="HEAD~20..HEAD"
            fi

            COMMITS=$(git log "$RANGE" --pretty=format:"%s" --no-merges)

            BREAKING=$(echo "$COMMITS" | grep -E '^[a-z]+(\(.+\))?!: ' | sed 's/^/- /' || true)
            FEAT=$(echo "$COMMITS" | grep -E '^feat(\(.+\))?: ' | sed 's/^/- /' || true)
            FIX=$(echo "$COMMITS" | grep -E '^fix(\(.+\))?: ' | sed 's/^/- /' || true)
            PERF=$(echo "$COMMITS" | grep -E '^perf(\(.+\))?: ' | sed 's/^/- /' || true)
            DOCS=$(echo "$COMMITS" | grep -E '^docs(\(.+\))?: ' | sed 's/^/- /' || true)
            CI_BUILD=$(echo "$COMMITS" | grep -E '^(ci|build)(\(.+\))?: ' | sed 's/^/- /' || true)
            OTHER=$(echo "$COMMITS" | grep -vE '^(feat|fix|perf|docs|ci|build|style|refactor|test|chore|revert)(\(.+\))?!?: ' | sed 's/^/- /' || true)

            if [ -n "$BREAKING" ]; then
              echo "### ⚠ Breaking Changes"
              echo "$BREAKING"
              echo ""
            fi
            if [ -n "$FEAT" ]; then
              echo "### Features"
              echo "$FEAT"
              echo ""
            fi
            if [ -n "$FIX" ]; then
              echo "### Bug Fixes"
              echo "$FIX"
              echo ""
            fi
            if [ -n "$PERF" ]; then
              echo "### Performance"
              echo "$PERF"
              echo ""
            fi
            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS"
              echo ""
            fi
            if [ -n "$CI_BUILD" ]; then
              echo "### Build & CI"
              echo "$CI_BUILD"
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi

            echo 'ENDOFNOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: ${{ steps.notes.outputs.BODY }}
